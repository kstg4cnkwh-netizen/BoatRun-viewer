<!doctype html>
<html lang="en-AU">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#1a5276"/>
<title>BoatRun Live</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:none}
body{height:100dvh;font-family:'Roboto',sans-serif;background:#efefef;overflow:hidden;
     padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
     display:flex;flex-direction:column;}

/* Top bar */
.top-bar{background:#1a5276;color:#fff;padding:10px 14px;display:flex;align-items:center;
         justify-content:space-between;flex-shrink:0;gap:8px;}
.top-title{font-size:13px;font-weight:700;letter-spacing:.12em;white-space:nowrap;}
.top-right{display:flex;align-items:center;gap:7px;flex-wrap:nowrap;}
.conn-pill{font-size:9px;font-weight:700;letter-spacing:.08em;padding:4px 9px;border-radius:10px;
           background:rgba(255,255,255,.18);color:rgba(255,255,255,.7);white-space:nowrap;}
.conn-pill.on{background:#27ae60;color:#fff;}
.squad-pill{font-size:9px;font-weight:700;letter-spacing:.16em;padding:4px 9px;border-radius:10px;
            background:rgba(255,255,255,.13);color:rgba(255,255,255,.9);white-space:nowrap;}
.disc-btn{font-size:9px;font-weight:700;letter-spacing:.06em;padding:4px 9px;border-radius:10px;
          background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);border:none;cursor:pointer;
          font-family:'Roboto',sans-serif;white-space:nowrap;touch-action:manipulation;}
.disc-btn:active{background:rgba(255,255,255,.28);}

/* Map */
#map{flex:1;min-height:0;width:100%;}

/* Leaflet tooltip overrides */
.rower-label{background:rgba(0,0,0,.72);border:none;box-shadow:none;border-radius:3px;
             padding:2px 6px;color:#fff;font-family:'Roboto',sans-serif;font-size:10px;
             font-weight:700;letter-spacing:.06em;white-space:nowrap;}
.rower-label::before{display:none;}

/* Rower strip */
.rower-strip{background:#fff;border-top:1px solid #ddd;padding:8px 8px 8px;
             overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
             display:flex;gap:8px;flex-shrink:0;min-height:160px;align-items:stretch;
             padding-bottom:max(8px, env(safe-area-inset-bottom));}
.rower-card{border-radius:6px;padding:10px 13px;min-width:140px;
            flex-shrink:0;border-left:4px solid #27ae60;display:flex;
            flex-direction:column;gap:1px;background:#f7f8fa;
            box-shadow:0 1px 3px rgba(0,0,0,.07);}
.rower-card.stale{opacity:.45;}
.rc-name{font-size:13px;font-weight:700;color:#111;white-space:nowrap;
         overflow:hidden;text-overflow:ellipsis;max-width:116px;}
.rc-metrics{display:flex;gap:10px;margin-top:5px;}
.rc-metric{display:flex;flex-direction:column;}
.rc-val{font-family:'Roboto Condensed',sans-serif;font-size:30px;font-weight:700;
        color:#1a5276;line-height:1.05;}
.rc-lbl{font-size:9px;color:#aaa;letter-spacing:.08em;margin-top:1px;}
.rc-age{font-size:8px;color:#ccc;margin-top:auto;padding-top:4px;}
.empty-strip{color:#bbb;font-size:12px;padding:8px 10px;display:flex;
             align-items:center;width:100%;justify-content:center;}

/* Entry overlay */
.entry-overlay{position:fixed;inset:0;background:#1a5276;display:flex;flex-direction:column;
               align-items:center;justify-content:center;z-index:1000;
               padding:30px 24px 40px;}
.entry-overlay.hidden{display:none;}
.entry-logo{font-size:10px;font-weight:700;letter-spacing:.28em;
            color:rgba(255,255,255,.45);margin-bottom:5px;}
.entry-title{font-size:26px;font-weight:700;color:#fff;letter-spacing:.1em;margin-bottom:36px;}
.entry-label{font-size:10px;font-weight:700;letter-spacing:.16em;
             color:rgba(255,255,255,.55);margin-bottom:8px;}
.entry-input{width:100%;max-width:280px;padding:15px 16px;border-radius:6px;border:2px solid transparent;
             font-family:'Roboto Condensed',sans-serif;font-size:28px;font-weight:700;
             letter-spacing:.3em;text-transform:uppercase;text-align:center;color:#1a5276;
             -webkit-appearance:none;appearance:none;outline:none;transition:border-color .15s;}
.entry-input:focus{border-color:#f39c12;}
.entry-btn{margin-top:12px;width:100%;max-width:280px;padding:16px;border-radius:6px;border:none;
           background:#27ae60;color:#fff;font-family:'Roboto',sans-serif;font-size:14px;
           font-weight:700;letter-spacing:.14em;cursor:pointer;touch-action:manipulation;}
.entry-btn:active{background:#229954;}
.entry-hint{margin-top:20px;font-size:11px;color:rgba(255,255,255,.38);
            text-align:center;line-height:1.8;}
</style>
</head>
<body>

<!-- Entry overlay -->
<div class="entry-overlay" id="entry-overlay">
  <div class="entry-logo">BOATRUN</div>
  <div class="entry-title">LIVE VIEW</div>
  <div class="entry-label">SQUAD CODE</div>
  <input class="entry-input" id="entry-code" type="text" maxlength="5"
         placeholder="·····" autocomplete="off" autocorrect="off"
         autocapitalize="characters" spellcheck="false"/>
  <button class="entry-btn" id="entry-btn">CONNECT</button>
  <div class="entry-hint">Enter the squad code from your coach<br/>to watch the session live</div>
</div>

<!-- Main UI (hidden until connected) -->
<div class="top-bar">
  <span class="top-title">BOATRUN LIVE</span>
  <div class="top-right">
    <span class="squad-pill" id="squad-pill"></span>
    <span class="conn-pill" id="conn-pill">OFFLINE</span>
    <button class="disc-btn" id="disc-btn">✕ LEAVE</button>
  </div>
</div>
<div id="map"></div>
<div class="rower-strip" id="rower-strip">
  <div class="empty-strip">Waiting for rowers…</div>
</div>

<script>
'use strict';
const SQUAD_DB_URL = 'https://boatrun-default-rtdb.asia-southeast1.firebasedatabase.app';
const COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#16a085'];

const fmt = s => {
    s = Math.max(0, Math.round(s));
    return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
};

// ── Map setup ─────────────────────────────────────────────────────────────
const _map = L.map('map', { zoomControl: true, attributionControl: false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(_map);

let _markers  = {};   // deviceId → L.CircleMarker
let _colorMap = {};   // deviceId → color string
let _colorIdx = 0;
let _positionedIds = new Set();

function colorFor(id) {
    if (!_colorMap[id]) {
        _colorMap[id] = COLORS[_colorIdx % COLORS.length];
        _colorIdx++;
    }
    return _colorMap[id];
}

function updateMap(rowers) {
    const ids = Object.keys(rowers);

    Object.keys(_markers).forEach(id => {
        if (!rowers[id]) {
            _map.removeLayer(_markers[id]);
            delete _markers[id];
            _positionedIds.delete(id);
        }
    });

    const validPos = [];
    let newRower = false;
    ids.forEach(id => {
        const r = rowers[id] || {};
        if (!r.lat || !r.lon) return;
        const ll   = [r.lat, r.lon];
        const col  = colorFor(id);
        const name = r.name || 'Rower';
        if (_markers[id]) {
            _markers[id].setLatLng(ll);
        } else {
            const m = L.circleMarker(ll, {
                radius: 9, color: '#fff', weight: 2.5,
                fillColor: col, fillOpacity: 1
            }).addTo(_map);
            m.bindTooltip(name, {
                permanent: true, direction: 'top',
                offset: [0, -12], className: 'rower-label'
            });
            _markers[id] = m;
        }
        if (!_positionedIds.has(id)) { _positionedIds.add(id); newRower = true; }
        validPos.push(ll);
    });

    if (newRower) {
        if (validPos.length === 1) {
            _map.setView(validPos[0], 16);
        } else if (validPos.length > 1) {
            try { _map.fitBounds(L.latLngBounds(validPos), { padding: [44, 44], maxZoom: 17 }); } catch {}
        }
    }
}

// ── Rower strip ───────────────────────────────────────────────────────────
function renderStrip(rowers) {
    const strip = document.getElementById('rower-strip');
    const ids = Object.keys(rowers);
    if (!ids.length) {
        strip.innerHTML = '<div class="empty-strip">Waiting for rowers…</div>';
        return;
    }
    const now = Date.now();
    strip.innerHTML = ids.map(id => {
        const r     = rowers[id] || {};
        const age   = r.t ? Math.round((now - r.t) / 1000) : null;
        const stale = age == null || age > 8;
        const col   = colorFor(id);
        return `<div class="rower-card${stale ? ' stale' : ''}" style="border-left-color:${col}">` +
            `<div class="rc-name">${r.name || 'Rower'}</div>` +
            `<div class="rc-metrics">` +
              `<div class="rc-metric"><div class="rc-val">${r.rate != null ? r.rate : '--'}</div><div class="rc-lbl">SPM</div></div>` +
              `<div class="rc-metric"><div class="rc-val">${r.pace > 0 ? fmt(r.pace) : '--:--'}</div><div class="rc-lbl">/500</div></div>` +
            `</div>` +
            `<div class="rc-age">${age != null ? age + 's ago' : 'no data'}</div>` +
        `</div>`;
    }).join('');
}

// ── Firebase listener ─────────────────────────────────────────────────────
let _es     = null;
let _rowers = {};

function connect(code) {
    disconnect();
    if (!code) return;
    _es = new EventSource(SQUAD_DB_URL + '/squads/' + code + '/rowers.json');

    const handle = raw => {
        let msg; try { msg = JSON.parse(raw); } catch { return; }
        if (!msg) return;
        if (msg.path === '/') {
            _rowers = {};
            const snap = msg.data || {};
            Object.keys(snap).forEach(id => {
                if (snap[id] && snap[id].live) _rowers[id] = snap[id].live;
            });
        } else {
            const parts = msg.path.split('/').filter(Boolean);
            if (!parts.length) return;
            const id = parts[0];
            if (msg.data === null) {
                delete _rowers[id];
            } else if (parts.length === 1) {
                if (msg.data && msg.data.live) _rowers[id] = msg.data.live;
            } else if (parts[1] === 'live') {
                _rowers[id] = msg.data;
            }
        }
        renderStrip(_rowers);
        updateMap(_rowers);
    };

    _es.addEventListener('put',   e => handle(e.data));
    _es.addEventListener('patch', e => handle(e.data));
    _es.onopen  = () => setPill(true);
    _es.onerror = () => setPill(false);
}

function disconnect() {
    if (_es) { _es.close(); _es = null; }
    _rowers   = {};
    _colorMap = {};
    _colorIdx = 0;
    _positionedIds.clear();
    Object.keys(_markers).forEach(id => { _map.removeLayer(_markers[id]); delete _markers[id]; });
    setPill(false);
    renderStrip({});
}

function setPill(on) {
    const p = document.getElementById('conn-pill');
    p.textContent = on ? 'CONNECTED' : 'OFFLINE';
    p.classList.toggle('on', on);
}

// ── UI wiring ─────────────────────────────────────────────────────────────
document.getElementById('entry-btn').addEventListener('click', () => {
    const code = (document.getElementById('entry-code').value || '').trim().toUpperCase();
    if (code.length < 3) return;
    document.getElementById('squad-pill').textContent = code;
    document.getElementById('entry-overlay').classList.add('hidden');
    connect(code);
});

document.getElementById('entry-code').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('entry-btn').click();
});

document.getElementById('disc-btn').addEventListener('click', () => {
    disconnect();
    document.getElementById('entry-code').value = '';
    document.getElementById('squad-pill').textContent = '';
    document.getElementById('entry-overlay').classList.remove('hidden');
});

// ── Age ticker ────────────────────────────────────────────────────────────
setInterval(() => { if (Object.keys(_rowers).length) renderStrip(_rowers); }, 2000);

// ── Map resize guard ──────────────────────────────────────────────────────
new ResizeObserver(() => _map.invalidateSize()).observe(document.getElementById('map'));
</script>
</body>
</html>
